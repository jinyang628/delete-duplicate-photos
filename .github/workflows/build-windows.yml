name: Build Windows executable

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install PyInstaller
        run: python -m pip install --disable-pip-version-check pyinstaller==6.21.0

      - name: Build executable
        run: python -m PyInstaller --clean --onefile --name DuplicatePhotoFinder main.py

      - name: Create checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash dist/DuplicatePhotoFinder.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  DuplicatePhotoFinder.exe" | Set-Content -NoNewline dist/DuplicatePhotoFinder.exe.sha256

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: DuplicatePhotoFinder-Windows
          path: |
            dist/DuplicatePhotoFinder.exe
            dist/DuplicatePhotoFinder.exe.sha256
          if-no-files-found: error

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view $env:GITHUB_REF_NAME *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:GITHUB_REF_NAME dist/DuplicatePhotoFinder.exe dist/DuplicatePhotoFinder.exe.sha256 --clobber
          } else {
            gh release create $env:GITHUB_REF_NAME dist/DuplicatePhotoFinder.exe dist/DuplicatePhotoFinder.exe.sha256 --generate-notes --title $env:GITHUB_REF_NAME
          }
